# Render.com blueprint for PBMSuperApp (Provider Portal).
# Creates: one Postgres DB, one FastAPI web service, one static-site frontend.
#
# To deploy:
#   1. Push this file to the branch you want Render to track.
#   2. Render dashboard → "Blueprints" → "New Blueprint Instance", pick this
#      repo + branch.
#   3. On first deploy, set every `sync: false` var in the API service's
#      Environment tab — Render keeps them encrypted.
#   4. Set ADMIN_BOOTSTRAP_EMAIL and ADMIN_BOOTSTRAP_PASSWORD in the API
#      service's Environment tab — the app will auto-create the admin account
#      on first boot. Use a strong randomly-generated password (20+ chars).
#      (real providers auto-provision on first Prognosis sign-in.)

databases:
  - name: rxhub-db
    plan: free
    databaseName: rxhub
    user: rxhub

services:
  - type: redis
    name: rxhub-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: rxhub-provider-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ── App / JWT ─────────────────────────────────────────────────
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_TTL_HOURS
        value: "8"

      # ── Database ─────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: rxhub-db
          property: connectionString

      # ── Redis (JWT logout revocation — survives restarts) ────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: rxhub-redis
          property: connectionString

      # ── CORS: required in production. Comma-separated allowed origins. ──
      # The app will refuse to start in production if this is missing or set to *.
      - key: CORS_ORIGINS
        value: https://rxhub-provider-portal.onrender.com

      # ── Prognosis (service account: base URL + username + password) ──
      - key: PROGNOSIS_BASE_URL
        value: https://prognosis-api.leadwayhealth.com
      - key: PROGNOSIS_USERNAME
        sync: false
      - key: PROGNOSIS_PASSWORD
        sync: false
      # Escape hatch — paste a full Authorization header ("Bearer …", "ApiKey …")
      # here if Prognosis doesn't accept Basic auth. Takes precedence when set.
      - key: PROGNOSIS_AUTH_HEADER
        sync: false

      # ── WellaHealth (Basic auth client_id:client_secret + Partner-Code) ──
      - key: WELLAHEALTH_BASE_URL
        value: https://api.wellahealth.com
      - key: WELLAHEALTH_CLIENT_ID
        sync: false
      - key: WELLAHEALTH_CLIENT_SECRET
        sync: false
      - key: WELLAHEALTH_PARTNER_CODE
        sync: false

      # ── Google Maps (Places + Geocoding) ─────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        sync: false

      # ── WhatsApp bot + routed numbers ────────────────────────────
      - key: WHATSAPP_BOT_URL
        value: https://leadway-whatsapp-bot.onrender.com/api
      - key: WHATSAPP_SEND_PATH
        value: /send-message
      # Body shape the bot expects. Leadway bot uses {phone, message}.
      - key: WHATSAPP_FIELD_PHONE
        value: phone
      - key: WHATSAPP_FIELD_MESSAGE
        value: message
      # Bot API key — set to the value the Leadway bot expects.
      # Header name defaults to "X-API-Key"; change if bot uses another.
      - key: WHATSAPP_API_KEY
        sync: false
      - key: WHATSAPP_API_KEY_HEADER
        value: X-API-Key
      - key: WHATSAPP_NUMBER_ACUTE_LAGOS
        sync: false
      - key: WHATSAPP_NUMBER_CHRONIC
        sync: false

      # ── Anthropic (AI drug classification) ───────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Embed handoff from a parent app the provider already signed into ──
      - key: EMBED_SHARED_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false

  - type: web
    name: rxhub-provider-portal
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

      # Prevent framing (clickjacking)
      - path: /*
        name: X-Frame-Options
        value: DENY

      # Stop browsers from MIME-sniffing away from the declared content-type
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

      # Enforce HTTPS for 1 year; include subdomains; eligible for preload list
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload

      # Only send the origin as referrer when crossing to a different origin
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

      # CSP: lock down script/connect sources to the known API host.
      # 'unsafe-inline' is required because the app uses inline JSX/scripts
      # loaded directly from <script> tags without a bundler. Tighten to a
      # nonce-based policy if a build step is introduced in future.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://rxhub-provider-api.onrender.com; img-src 'self' data: blob:; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"

      # Disable powerful browser features not needed by the portal
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=()"

      # Block legacy Flash/PDF cross-domain data requests
      - path: /*
        name: X-Permitted-Cross-Domain-Policies
        value: none

    envVars: []
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── PBM Portal — internal staff app ────────────────────────────────────────
  - type: web
    name: rxhub-pbm-api
    runtime: python
    plan: free
    rootDir: pbm-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://rxhub-pbm-portal.onrender.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: rxhub-redis
          property: connectionString
      # Set this to a strong random password in the Render dashboard.
      # All seed staff accounts use this password until Azure SSO is wired up.
      - key: STAFF_DEFAULT_PASSWORD
        sync: false

  - type: web
    name: rxhub-pbm-portal
    runtime: static
    rootDir: pbm-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains; preload
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://rxhub-pbm-api.onrender.com; img-src 'self' data: blob:; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';"
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=()"
      - path: /*
        name: X-Permitted-Cross-Domain-Policies
        value: none
    envVars:
      - key: VITE_API_URL
        value: https://rxhub-pbm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
