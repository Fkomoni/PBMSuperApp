# Render.com blueprint for PBMSuperApp (Provider Portal).
# Creates: one Postgres DB, one FastAPI web service, one static-site frontend.
#
# To deploy:
#   1. Push this file to main (or your chosen branch).
#   2. In the Render dashboard → "Blueprints" → "New Blueprint Instance",
#      pick this repo and the branch.
#   3. After first deploy, SSH into the backend service and run:
#         python seed_provider.py doctor@clinic.com "Dr Jane Doe" "somePw123!"
#      (or hit POST /api/v1/providers/register once, then disable that route.)

databases:
  - name: rxhub-db
    plan: free
    databaseName: rxhub
    user: rxhub

services:
  - type: web
    name: rxhub-provider-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_TTL_HOURS
        value: "8"
      - key: DATABASE_URL
        fromDatabase:
          name: rxhub-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://rxhub-provider-portal.onrender.com
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: PROGNOSIS_BASE_URL
        value: https://prognosis-api.leadwayhealth.com
      - key: PROGNOSIS_API_KEY
        sync: false
      - key: WELLAHEALTH_BASE_URL
        value: https://staging.wellahealth.com/v1
      - key: WELLAHEALTH_API_KEY
        sync: false
      - key: WHATSAPP_BOT_URL
        value: https://leadway-whatsapp-bot.onrender.com/api
      - key: WHATSAPP_NUMBER_ACUTE_LAGOS
        sync: false
      - key: WHATSAPP_NUMBER_CHRONIC
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: rxhub-provider-portal
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars: []
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
